<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact Me</title>
</head>

<body>

    <header class="site-header">
        <h1 class="logo">My Portfolio</h1>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><strong><a href="contact.html" class="active">Contact</a></strong></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>Contact Me</h2>

        <form action="https://formspree.io/f/xbdengla" method="POST"></form>
        <fieldset>
            <legend>Send a Message</legend>

            <p>
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
            </p>

            <p>
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </p>

            <p>
                <label for="phone">Phone Number (Optional):</label>
                <input type="tel" id="phone" name="phone" placeholder="+1234567890">
            </p>

            <p>
                <label for="subject">Subject:</label>
                <select id="subject" name="subject">
                    <option value="general">General Inquiry</option>
                    <option value="project">Project Collaboration</option>
                    <option value="support">Technical Support</option>
                </select>
            </p>

            <p>
                <label for="message">Message (Minimum 50 characters):</label><br>
                <textarea id="message" name="message" rows="5" cols="40" minlength="50"
                    placeholder="Write your detailed message here..." required></textarea>
            </p>

            <p>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </p>

            <p>
                <button type="submit">Submit Form</button>
            </p>

        </fieldset>
        </form>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Francis Osoro</p>
    </footer>

</body>

</html>
